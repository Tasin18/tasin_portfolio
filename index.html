<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Md.Golam All Gaffar Tasin | CSE Portfolio</title>
    <!-- Preload Tailwind CSS and Google Fonts for faster rendering -->
    <link rel="preload" href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" as="style" onload="this.rel='stylesheet'">
    <noscript><link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet"></noscript>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Georgia:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', Arial, sans-serif; background: #f8f9fa; color: #222; }
      h1, h2, h3, h4, h5, h6 { font-family: 'Georgia', serif; }
      html { scroll-behavior: smooth; }
      .section-title {
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 1.15rem;
        color: #2a3a4d;
        border-bottom: 1px solid #e0e0e0;
        padding-bottom: 0.25em;
        margin-bottom: 1.5em;
        font-weight: 700;
      }
      .academic-container {
        max-width: 900px;
        margin: 0 auto;
        background: #fff;
        box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        border-radius: 8px;
        padding: 2.5rem 2rem 2rem 2rem;
      }
      .academic-header {
        border-bottom: 2px solid #e0e0e0;
        margin-bottom: 2rem;
        padding-bottom: 1rem;
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 2rem;
      }
      .academic-headshot {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid #e0e0e0;
      }
      .academic-contact {
        font-size: 0.95rem;
        color: #444;
        margin-top: 0.5em;
      }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-900">
    <div id="root"></div>
    <!-- React, ReactDOM, Babel (production builds, loaded at end of body for speed) -->
    <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Portfolio App -->
    <script type="text/babel">
      // Utility: Fetch JSON config
      function useConfig() {
        const [config, setConfig] = React.useState(null);
        const [error, setError] = React.useState(null);
        React.useEffect(() => {
          fetch('config.json')
            .then(res => {
              if (!res.ok) throw new Error('Failed to load config.json');
              return res.json();
            })
            .then(setConfig)
            .catch(e => setError(e.message));
        }, []);
        return [config, error];
      }

      // Navigation Bar Component
      function Navbar({ about }) {
        const navItems = [
          { label: 'About', href: '#about' },
          { label: 'Education', href: '#education' },
          { label: 'Skills', href: '#skills' },
          { label: 'Experience', href: '#experience' },
          { label: 'Projects', href: '#projects' },
          { label: 'Publications', href: '#publications' },
          { label: 'Research', href: '#research' },
          { label: 'CV', href: '#cv' },
          { label: 'Contact', href: '#contact' },
        ];
        const [open, setOpen] = React.useState(false);
        return (
          <nav className="fixed w-full bg-white border-b border-gray-200 z-50">
            <div className="max-w-5xl mx-auto flex justify-between items-center px-4 py-2">
              <span className="font-bold text-lg tracking-wide">{about?.name || 'Portfolio'}</span>
              <button className="md:hidden p-2 focus:outline-none" onClick={() => setOpen(!open)} aria-label="Toggle navigation">
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
                </svg>
              </button>
              <ul className="hidden md:flex space-x-4">
                {navItems.map(item => (
                  <li key={item.href}>
                    <a href={item.href} className="hover:text-blue-600 transition-colors duration-200 focus:outline-none focus:underline">{item.label}</a>
                  </li>
                ))}
              </ul>
            </div>
            {/* Mobile menu */}
            {open && (
              <ul className="md:hidden flex flex-col space-y-2 px-4 pb-4 bg-white border-t">
                {navItems.map(item => (
                  <li key={item.href}>
                    <a href={item.href} className="block py-2 hover:text-blue-600 transition-colors duration-200 focus:outline-none focus:underline" onClick={() => setOpen(false)}>{item.label}</a>
                  </li>
                ))}
              </ul>
            )}
          </nav>
        );
      }

      // About Section
      function About({ about, contact }) {
        if (!about) return null;
        return (
          <section id="about" className="pt-24 pb-8 bg-white">
            <div className="max-w-3xl mx-auto px-4">
              <div className="academic-header">
                  <img src={about.headshot} alt={about.name + ' professional headshot'} className="academic-headshot" loading="lazy" />
                <div>
                  <h1 className="text-3xl font-bold mb-1" style={{fontFamily: 'Georgia, serif'}}>{about.name}</h1>
                  <h2 className="text-lg text-blue-900 mb-2" style={{fontFamily: 'Georgia, serif'}}>{about.title}</h2>
                  <p className="mb-2 text-base">{about.summary}</p>
                  {contact && (
                    <div className="academic-contact">
                      <span>Email: <a href={`mailto:${contact.email}`} className="text-blue-700 hover:underline">{contact.email}</a></span><br/>
                      <span>LinkedIn: <a href={contact.linkedin} target="_blank" rel="noopener noreferrer" className="text-blue-700 hover:underline">Profile</a></span>
                      {contact.github && <><br/><span>GitHub: <a href={contact.github} target="_blank" rel="noopener noreferrer" className="text-blue-700 hover:underline">{contact.github}</a></span></>}
                    </div>
                  )}
                </div>
              </div>
            </div>
          </section>
        );
      }

      // Education Section
      function Education({ education }) {
        if (!education) return null;
        return (
          <section id="education" className="py-10 bg-gray-50">
            <div className="academic-container">
              <h2 className="section-title">Education</h2>
              {education.map((item, idx) => (
                <div key={idx} className="mb-6">
                  <h3 className="font-semibold text-lg" style={{fontFamily: 'Georgia, serif'}}>{item.degree || item.certification}</h3>
                  <div className="text-sm text-gray-700 mb-1">
                    {item.university || item.institution}{item.university || item.institution ? ',' : ''} {item.year}
                  </div>
                  {item.cgpa && <div className="text-sm">CGPA: {item.cgpa}</div>}
                  {item.result && <div className="text-sm">Result: {item.result}</div>}
                  {item.group && <div className="text-sm">Group: {item.group}</div>}
                  {item.coursework && item.coursework.length > 0 && (
                    <div className="text-xs text-gray-600 mt-1">
                      <span className="font-semibold">Relevant Coursework:</span>
                      <ul className="list-disc ml-6 mt-1">
                        {item.coursework.map((course, i) => (
                          <li key={i}>{course}</li>
                        ))}
                      </ul>
                    </div>
                  )}
                  {item.issuer && <div className="text-sm">{item.issuer}</div>}
                  {item.certificate_link && (
                    <div className="mt-1">
                      <a href={item.certificate_link} target="_blank" rel="noopener noreferrer" className="text-blue-700 hover:underline text-xs">View Certificate</a>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </section>
        );
      }

      // Skills Section
      function Skills({ skills }) {
        if (!skills) return null;
        // Dynamically render all skill categories and their items
        return (
          <section id="skills" className="py-10 bg-white">
            <div className="academic-container">
              <h2 className="section-title">Skills</h2>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                {Object.entries(skills).map(([category, items]) => (
                  <div key={category}>
                    <h3 className="font-semibold mb-2 capitalize" style={{fontFamily: 'Georgia, serif'}}>{category.replace(/_/g, ' ')} Skills</h3>
                    <ul className="list-disc ml-6 text-sm">
                      {items.map((s, i) => <li key={i}>{s}</li>)}
                    </ul>
                  </div>
                ))}
              </div>
            </div>
          </section>
        );
      }

      // Experience Section
      function Experience({ experience }) {
        if (!experience) return null;
        return (
          <section id="experience" className="py-10 bg-gray-50">
            <div className="academic-container">
              <h2 className="section-title">Experience</h2>
              {experience.map((item, idx) => (
                <div key={idx} className="mb-6">
                  <h3 className="font-semibold text-base" style={{fontFamily: 'Georgia, serif'}}>{item.role}{item.institution ? `, ${item.institution}` : ''}</h3>
                  <div className="text-sm text-gray-700 mb-1">{item.duration}</div>
                  <div className="text-sm">{item.description}</div>
                </div>
              ))}
            </div>
          </section>
        );
      }

      // Projects Section
      function Projects({ projects }) {
        if (!projects) return null;
        return (
          <section id="projects" className="py-10 bg-white">
            <div className="academic-container">
              <h2 className="section-title">Projects</h2>
              <div className="grid gap-6 md:grid-cols-2">
                {projects.map((project, idx) => (
                  <div key={idx} className="bg-gray-50 rounded p-4 border border-gray-100">
                    <h3 className="font-semibold mb-1 text-base" style={{fontFamily: 'Georgia, serif'}}>{project.title}</h3>
                    <p className="mb-2 text-sm">{project.description}</p>
                    <p className="mb-2 text-xs text-gray-600">Technologies: {project.technologies?.join(', ')}</p>
                    {project.outcomes && <p className="mb-2 text-xs text-gray-600">{project.outcomes}</p>}
                    {project.link && <a href={project.link} target="_blank" rel="noopener noreferrer" className="text-blue-700 hover:underline text-sm">View Project</a>}
                  </div>
                ))}
              </div>
            </div>
          </section>
        );
      }

      // Publications Section
      function Publications({ publications }) {
        if (!publications) return null;
        // Support grouped publications with heading and items
        return (
          <section id="publications" className="py-10 bg-gray-50">
            <div className="academic-container">
              <h2 className="section-title">Publications</h2>
              <div className="grid gap-6">
                {publications.map((group, idx) => (
                  <div key={idx}>
                    <h3 className="font-semibold mb-2" style={{fontFamily: 'Georgia, serif'}}>{group.heading}</h3>
                    <ul className="ml-2">
                      {group.items && group.items.map((item, i) => (
                        <li key={i} className="mb-4">
                          <div className="flex flex-col md:flex-row md:items-center md:justify-between">
                            <div>
                              <span className="font-semibold text-base" style={{fontFamily: 'Georgia, serif'}}>{item.title}</span>
                              {item.venue && <div className="italic text-sm text-gray-700 mt-1">{item.venue}</div>}
                            </div>
                            {item.year && <span className="text-xs text-gray-500 md:text-right md:ml-4 mt-1 md:mt-0">{item.year}</span>}
                          </div>
                          {item.link && (
                            <div className="mt-2">
                              <a href={item.link} target="_blank" rel="noopener noreferrer" className="inline-block bg-blue-700 text-white px-3 py-1 rounded hover:bg-blue-800 text-xs font-medium">View Publication</a>
                            </div>
                          )}
                        </li>
                      ))}
                    </ul>
                  </div>
                ))}
              </div>
            </div>
          </section>
        );
      }

      // Research Interests Section
      function Research({ research_interests }) {
        if (!research_interests) return null;
        return (
          <section id="research" className="py-10 bg-white">
            <div className="academic-container">
              <h2 className="section-title">Research Interests</h2>
              <ul className="list-disc ml-6 mb-4 text-sm">
                {research_interests.map((r, i) => <li key={i}>{r}</li>)}
              </ul>
            </div>
          </section>
        );
      }

      // CV Section
      function CVSection() {
        // Assumes cv.pdf is in the same directory as index.html
        return (
          <section id="cv" className="py-10 bg-white">
            <div className="academic-container text-center">
              <h2 className="section-title">Download CV</h2>
              <a href="cv.pdf" download className="inline-block bg-blue-700 text-white px-6 py-3 rounded hover:bg-blue-800 font-semibold">Download My CV (PDF)</a>
            </div>
          </section>
        );
      }

      // Contact Section
      function Contact({ contact }) {
        if (!contact) return null;
        const [form, setForm] = React.useState({ name: '', email: '', message: '' });
        const [submitted, setSubmitted] = React.useState(false);
        const [error, setError] = React.useState('');
        const [sending, setSending] = React.useState(false);
        function handleChange(e) {
          setForm({ ...form, [e.target.name]: e.target.value });
        }
        async function handleSubmit() {
          if (!form.name || !form.email || !form.message) {
            setError('Please fill in all fields.');
            return;
          }
          if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(form.email)) {
            setError('Please enter a valid email address.');
            return;
          }
          setSending(true);
          setError('');
          // Replace the endpoint below with your Formspree endpoint after signup
          const endpoint = 'https://formspree.io/f/xnndrgjk'; // DEMO endpoint, replace with your own
          try {
            const res = await fetch(endpoint, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                name: form.name,
                email: form.email,
                message: form.message
              })
            });
            if (res.ok) {
              setSubmitted(true);
              setForm({ name: '', email: '', message: '' });
            } else {
              setError('Failed to send message. Please try again later.');
            }
          } catch (e) {
            setError('Failed to send message. Please try again later.');
          }
          setSending(false);
        }
        return (
          <section id="contact" className="py-10 bg-gray-50">
            <div className="academic-container">
              <h2 className="section-title">Contact</h2>
              <div className="mb-4 text-sm">
                <span>Email: <a href={`mailto:${contact.email}`} className="text-blue-700 hover:underline">{contact.email}</a></span><br/>
                <span>LinkedIn: <a href={contact.linkedin} target="_blank" rel="noopener noreferrer" className="text-blue-700 hover:underline">Profile</a></span>
                {contact.github && <><br/><span>GitHub: <a href={contact.github} target="_blank" rel="noopener noreferrer" className="text-blue-700 hover:underline">{contact.github}</a></span></>}
              </div>
              <div className="bg-gray-50 rounded border border-gray-100 p-4">
                <h3 className="font-semibold mb-2" style={{fontFamily: 'Georgia, serif'}}>Contact Form</h3>
                {submitted ? (
                  <p className="text-green-700">Thank you for your message!</p>
                ) : (
                  <>
                    <div className="mb-2">
                      <label className="block text-sm font-medium">Name</label>
                      <input type="text" name="name" value={form.name} onChange={handleChange} className="w-full border rounded px-2 py-1" />
                    </div>
                    <div className="mb-2">
                      <label className="block text-sm font-medium">Email</label>
                      <input type="email" name="email" value={form.email} onChange={handleChange} className="w-full border rounded px-2 py-1" />
                    </div>
                    <div className="mb-2">
                      <label className="block text-sm font-medium">Message</label>
                      <textarea name="message" value={form.message} onChange={handleChange} className="w-full border rounded px-2 py-1" rows="3"></textarea>
                    </div>
                    {error && <p className="text-red-700 text-sm mb-2">{error}</p>}
                    <button type="button" onClick={handleSubmit} className="bg-blue-700 text-white px-4 py-2 rounded hover:bg-blue-800 transition-colors" disabled={sending}>{sending ? 'Sending...' : 'Send'}</button>
                  </>
                )}
              </div>
            </div>
          </section>
        );
      }

      // Main App Component
      function App() {
        const [config, error] = useConfig();
        if (error) return <div className="text-center mt-20 text-red-600">{error}</div>;
        if (!config) return <div className="text-center mt-20">Loading...</div>;
        return (
          <div className="min-h-screen flex flex-col">
            <Navbar about={config.about} />
            <main className="flex-1">
              <About about={config.about} contact={config.contact} />
              <Education education={config.education} />
              <Skills skills={config.skills} />
              <Experience experience={config.experience} />
              <Projects projects={config.projects} />
              <Publications publications={config.publications} />
              <Research research_interests={config.research_interests} />
              <CVSection />
              <Contact contact={config.contact} />
            </main>
            <footer className="text-center text-xs text-gray-500 py-4 bg-gray-50 mt-8">
              &copy; {new Date().getFullYear()} {config.about?.name || 'Portfolio'}. Built with React & Tailwind CSS.
            </footer>
          </div>
        );
      }

      // Render the App
      ReactDOM.render(<App />, document.getElementById('root'));
    </script>
  </body>
</html>
